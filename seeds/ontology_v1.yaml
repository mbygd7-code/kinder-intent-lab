# Intent Ontology 시드 — domain → intent 2계층 (설계 문서 §5-9)
# 정본 intent 7종(play_expand 등)은 설계 문서 출처, 56종은 2026-07-08 멀티에이전트 저작.
# onto-2.0 (2026-07-15, 마스터 문서 v1.5 §5-10 v2 — 사용자 승인): STUDIO(자료 만들기) region
# 신설 + studio_* 6종·refl_child_guidance_consult 저작 + visual_image_generate STUDIO 이동(B안).
# UNKNOWN은 domain 없음 (§5-8 미분류 pool). 수정 시 버전 규칙(minor/major)을 따를 것.
# positive_examples는 seeds/ontology_examples_draft.csv가 원본 — 수정은 시트를 고치고 scripts/apply_ontology_examples.py --write (직접 편집 금지)
version: onto-2.0
change_type: major
domains:
- PLAY
- OBSERVATION
- DOCUMENT
- VISUAL
- COMMUNICATION
- OPERATION
- REFLECTION
- STUDIO
intents:
- intent_id: play_expand
  domain: PLAY
  definition: 진행 중인 놀이의 장면이나 관찰 내용을 입력으로 받아, 그 놀이의 주제와 내용을 더 넓고 깊게 발전시킬 확장 아이디어를 제안한다.
  positive_examples:
  - 이 블록놀이 좀 더 키워볼 만한 거 없을까?
  - 얘들이 요즘 공룡에 푹 빠졌는데 여기서 뭘 더 해볼 수 있을까?
  - 요즘 애들 세차장놀이에 푹 빠졌는데 이걸 더 크게 벌여볼 방법 없을까?
  - 지금 하는 시장놀이 더 풍성하게 만들어줘
  - 이 놀이에서 뻗어나갈 가지 좀 뽑아줘
  - 블록으로 다리를 만들었는데 여기서 놀이를 어떻게 더 키우지?
  negative_examples:
  - 이 놀이 슬슬 마무리하고 다음엔 뭘 해주면 좋을까?
  - 가게놀이 하는데 뭐 더 갖다주면 좋을까, 재료 같은 거?
  confusable_with:
  - play_transition_next_step
  - play_revive_stalled
  - doc_expand_text
  - studio_topic_web_generate
- intent_id: play_transition_next_step
  domain: PLAY
  definition: 현재 진행 중인 놀이의 흐름과 도달 지점을 입력으로 받아, 그 놀이에서 이어서 전개할 다음 단계 활동을 제안한다.
  positive_examples:
  - 다음엔 뭘 해주면 좋을까?
  - 병원놀이 오늘 여기까지 했는데 내일은 뭘로 이어가지?
  - 가게놀이 마무리하고 이어서 뭘 하면 좋을까?
  - 오늘 색깔 탐색 끝났는데 내일은 뭘로 이어가지?
  - 이 활동 다음 단계 활동 추천해줘
  - 물감놀이 다음으로 넘어갈 활동 하나만 짜줘
  negative_examples:
  - 이 놀이 더 크게 벌려볼 아이디어 없어?
  - 애들이 놀이에 흥미를 잃었는데 어떻게 다시 끌어올리지?
  confusable_with:
  - play_expand
  - play_flow_naturalize
  - write_activity_followup
- intent_id: play_flow_naturalize
  domain: PLAY
  definition: 계획된 놀이 활동들의 순서와 연결 상태를 입력으로 받아, 단계 사이의 전환이 매끄러워지도록 흐름을 다듬은 전개안을 제안한다.
  positive_examples:
  - 이 순서가 좀 뚝뚝 끊기는데 흐름 좀 매끄럽게 해줘
  - 도입에서 바로 만들기로 넘어가니까 어색해, 연결 좀 자연스럽게
  - 도입에서 전개로 넘어가는 게 뚝뚝 끊겨, 흐름 좀 매끄럽게 이어줘
  - 이 활동 순서 자연스럽게 다시 배열해줘
  - 노래 부르다 갑자기 만들기로 넘어가니 어색한데 중간을 이어줄 것 없을까?
  - 전이가 너무 급해, 활동 연결 좀 부드럽게 해줘
  negative_examples:
  - 이 알림장 문장 좀 자연스럽게 다듬어줘
  - 이 놀이 다음 활동으로는 뭐가 좋을까?
  confusable_with:
  - text_naturalize
  - play_transition_next_step
  - doc_plan_draft
- intent_id: play_material_suggest
  domain: PLAY
  definition: 진행 중인 놀이의 주제와 상황을 입력으로 받아, 그 놀이에 새로 투입하면 좋을 놀잇감·재료 목록을 추천한다.
  positive_examples:
  - 가게놀이 하는데 뭐 더 넣어주면 좋을까?
  - 요즘 애들이 병원놀이에 푹 빠졌는데 새로 넣어줄 만한 재료 뭐 있을까?
  - 병원놀이에 새로 넣어줄 만한 소품 뭐 있을까?
  - 요즘 곤충에 관심 많은데 놀이에 보태줄 재료 추천해줘
  - 블록 영역에 뭘 더 넣어주면 애들이 재밌어할까?
  - 가게놀이 물건이 시시해졌나 봐, 새 놀잇감 좀 골라줘
  negative_examples:
  - 이 재료들 목록대로 주문 좀 넣어줘
  - 공룡놀이 더 재밌게 발전시킬 아이디어 없어?
  confusable_with:
  - op_material_prepare
  - play_environment_setup
- intent_id: play_scenario_generate
  domain: PLAY
  definition: 놀이 주제나 유아의 관심사를 입력으로 받아, 상상놀이에 바로 쓸 수 있는 이야기 배경과 역할 상황이 담긴 시나리오를 생성한다.
  positive_examples:
  - 우주 탐험 역할놀이 상황극 하나 짜줘
  - 얘들 소방관 놀이 하는데 출동하는 이야기 좀 만들어줘
  - 공룡 구조대 역할놀이 상황극 대본 하나 만들어줘
  - 바닷속 탐험 상상놀이 이야기 짜줘
  - 미용실놀이 상황 설정 좀 만들어줄래?
  - 우체국놀이 역할이랑 상황 시나리오 뽑아줘
  negative_examples:
  - 오늘 놀이한 거 이야기처럼 기록으로 써줘
  - 이 역할놀이 다음엔 어떤 활동으로 넘어갈까?
  confusable_with:
  - play_expand
  - visual_image_generate
- intent_id: play_inquiry_question
  domain: PLAY
  definition: 진행 중인 놀이 장면을 입력으로 받아, 유아의 탐구와 사고를 자극할 교사 발문 목록을 생성한다.
  positive_examples:
  - 그림자 놀이 하는데 애들한테 뭐라고 물어보면 좋을까?
  - 여기서 던질 만한 질문 몇 개만 뽑아줘
  - 얼음 녹는 걸 보고 있는데 뭐라고 물어봐 주면 좋을까?
  - 이 그림자놀이에서 던질 탐구 질문 몇 개 만들어줘
  - 애들 생각을 끌어낼 발문 좀 뽑아줘
  - 바람개비 돌리는 애들한테 할 질문 추천해줘
  negative_examples:
  - 학부모 만족도 설문 문항 좀 만들어줘
  - 이 탐색놀이 확장할 활동 아이디어 좀 줘
  confusable_with:
  - play_revive_stalled
  - play_expand
- intent_id: play_level_adapt
  domain: PLAY
  definition: 기존 놀이 활동을 입력으로 받아, 유아의 연령과 발달 수준에 맞게 난이도와 방법을 조정한 변형안을 생성한다.
  positive_examples:
  - 이거 만 3세도 할 수 있게 좀 쉽게 바꿔줘
  - 이 게임 우리 반 형님들한텐 너무 시시한데 좀 어렵게 해줄래?
  - 이 게임 만 5세용인데 동생반도 할 수 있게 쉽게 바꿔줘
  - 규칙이 너무 어려운가 봐, 수준 좀 낮춰줄래?
  - 우리 반 형님들한텐 싱거운데 좀 어렵게 변형해줘
  - 이 활동 연령별로 난이도 나눠서 정리해줘
  negative_examples:
  - 이 놀이 다음 단계로는 뭘 하면 좋을까?
  - 이 가정통신문 어휘 수준 좀 쉽게 낮춰줘
  confusable_with:
  - play_expand
  - play_revive_stalled
- intent_id: play_revive_stalled
  domain: PLAY
  definition: 흥미가 식거나 전개가 막힌 놀이 상황을 입력으로 받아, 유아의 몰입을 되살릴 교사 개입 방법을 제안한다.
  positive_examples:
  - 애들이 며칠 만에 시큰둥해졌는데 어떻게 다시 불붙이지?
  - 가게놀이가 손님이 없어서 영 안 굴러가, 뭘 해줘야 하나
  - 역할놀이가 사흘째 똑같이 돌아, 다시 재미 붙일 방법 없을까?
  - 애들이 블록 영역엔 아예 안 가, 어떻게 끌어들이지?
  - 시들해진 병원놀이 좀 살려줘
  - 몰입이 확 떨어졌는데 불씨 살릴 아이디어 줘
  negative_examples:
  - 이 놀이 이제 마무리하고 다음엔 뭐 할까?
  - 이 놀이 더 크게 확장하고 싶은데 아이디어 줘
  confusable_with:
  - play_expand
  - play_material_suggest
  - play_transition_next_step
- intent_id: play_environment_setup
  domain: PLAY
  definition: 놀이 주제와 교실 여건을 입력으로 받아, 그 놀이가 잘 일어나도록 공간과 흥미 영역을 배치한 환경 구성안을 제안한다.
  positive_examples:
  - 역할놀이 영역 이번엔 어떻게 꾸며주지?
  - 블록이랑 미술 영역 자리 바꿔볼까 하는데 배치 좀 짜줘
  - 봄 주제로 역할영역 어떻게 꾸밀지 배치안 짜줘
  - 쌓기 영역이랑 언어 영역 자리 바꿔서 구성해줄래?
  - 교실 흥미영역 재배치 아이디어 줘
  - 캠핑놀이 하게 교실 한쪽을 캠핑장처럼 꾸미고 싶어
  negative_examples:
  - 가게놀이에 쓸 소품은 뭐가 필요할까?
  - 이 활동 사진들 정리 좀 해줘
  confusable_with:
  - play_material_suggest
  - visual_layout_refine
- intent_id: obs_record_moment
  domain: OBSERVATION
  definition: 교사가 짧게 구술하거나 메모한 아이의 행동·말 장면을 입력받아 날짜·아동·상황 정보가 채워진 관찰 기록으로 저장한다.
  positive_examples:
  - 지호 방금 처음으로 가위질 성공했어, 이거 적어놔
  - 방금 그 상황 관찰일지에 남겨줘
  - 서아가 방금 친구한테 양보했어, 이거 남겨놔
  - 지금 도윤이가 한 말 관찰 메모로 적어줘
  - 하윤이 오늘 처음으로 혼자 신발 신었어, 적어두자
  - 방금 그 장면 짧게 기록해놔줘
  negative_examples:
  - 이거 알림장에 써줘
  - 지호 지난달 관찰 기록 좀 보여줘
  confusable_with:
  - doc_observation_record
  - obs_capture_scene
  - refl_self_journal
- intent_id: obs_capture_scene
  domain: OBSERVATION
  definition: 교사가 지목한 지금 벌어지고 있는 놀이·활동 장면을 사진이나 영상으로 포착해 관찰 증거로 저장한다.
  positive_examples:
  - 지금 이 장면 좀 찍어놔
  - 쌓기놀이 하는 거 영상으로 담아줘
  - 저기 모래놀이 하는 거 사진으로 남겨줘
  - 지금 합주하는 장면 영상 좀 찍어놔
  - 이 장면 놓치지 말고 담아줘
  - 율동하는 모습 카메라로 잡아줘
  negative_examples:
  - 이 사진 정리 좀
  - 방금 서아가 한 말 기록해둬
  confusable_with:
  - obs_record_moment
  - obs_set_watchpoint
- intent_id: obs_tag_children
  domain: OBSERVATION
  definition: 화면에 열려 있는 사진이나 관찰 기록에 등장하는 아이가 누구인지 지정받아 그 자료를 해당 아동의 프로필에 연결한다.
  positive_examples:
  - 이 사진 서준이랑 하윤이야
  - 여기 나온 애들 태그 좀 해줘
  - 이 사진에 나온 애들 누군지 연결해줘
  - 여기 왼쪽이 도윤이고 오른쪽이 서아야
  - 이 영상 속 아이 민준이로 태그해줘
  - 방금 올린 사진들 태그 좀 해줘
  negative_examples:
  - 이 사진 하윤이 포트폴리오에 넣어줘
  - 이 사진 무슨 발달영역이야?
  confusable_with:
  - visual_photo_organize
  - op_workspace_organize
- intent_id: obs_classify_development
  domain: OBSERVATION
  definition: 화면의 관찰 기록이나 포착된 장면의 내용을 분석해 해당하는 발달 영역과 누리과정 지표로 분류한다.
  positive_examples:
  - 이 기록 어느 영역에 넣으면 돼?
  - 이거 의사소통 쪽으로 분류해줘
  - 이 관찰 기록 신체운동 영역으로 분류해줘
  - 방금 기록 어느 발달영역에 해당해?
  - 이거 누리과정 어디에 넣으면 될까?
  - 이 장면은 의사소통이야 사회관계야?
  negative_examples:
  - 이 기록 문장 좀 자연스럽게 다듬어줘
  - 민서 발달이 또래보다 느린 건 아니지?
  confusable_with:
  - refl_milestone_check
  - op_workspace_organize
- intent_id: obs_summarize_child
  domain: OBSERVATION
  definition: 지정된 아이의 누적 관찰 기록과 사진을 모아 최근 행동·발달 흐름을 한눈에 볼 수 있는 요약으로 생성한다.
  positive_examples:
  - 요즘 도윤이 어떻게 지내?
  - 이번 달 서아 관찰한 거 정리해줘
  - 서준이 최근 관찰 기록 한눈에 정리해줘
  - 이번 주 하윤이 어떻게 지냈는지 요약해줄래?
  - 민서 관찰한 것들 모아서 브리핑해줘
  - 다온이 요즘 모습 정리 좀 해줘
  negative_examples:
  - 도윤이 상담 때 쓸 자료로 만들어줘
  - 서아 요즘 좀 달라지지 않았어?
  confusable_with:
  - refl_child_progress_review
  - obs_detect_behavior_change
  - doc_portfolio_comment
- intent_id: obs_detect_behavior_change
  domain: OBSERVATION
  definition: 특정 아이 또는 반 전체의 관찰 데이터를 이전 시기와 비교해 달라진 행동 패턴이나 주의가 필요한 변화를 탐지해 보고한다.
  positive_examples:
  - 요즘 지우가 좀 달라진 것 같은데, 뭐 있어?
  - 혼자 노는 시간이 부쩍 는 애 있나 봐줘
  - 우리 반에 요즘 식사량 확 준 애 있는지 봐줘
  - 지호 행동이 지난주랑 달라진 게 있나 확인해줘
  - 평소랑 다르게 구는 애 있으면 짚어줘
  - 서아 요즘 말수가 준 것 같은데 기록상으로도 그래?
  negative_examples:
  - 지우 이번 달 기록 요약해줘
  - 지우가 또 울면 바로 알려줘
  confusable_with:
  - refl_support_need_scan
  - obs_summarize_child
  - refl_child_progress_review
- intent_id: obs_recommend_focus
  domain: OBSERVATION
  definition: 아이별 관찰 기록의 누적량과 공백을 근거로 다음에 누구를 어떤 장면에서 관찰하면 좋을지 관찰 대상을 추천한다.
  positive_examples:
  - 내일은 누굴 좀 봐야 하지?
  - 관찰이 제일 부족한 애 누구야?
  - 이번 주엔 누굴 중점적으로 관찰하면 좋을까?
