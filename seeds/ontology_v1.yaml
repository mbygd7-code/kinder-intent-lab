# Intent Ontology v1 시드 — domain → intent 2계층 (설계 문서 §5-9)
# 정본 intent 7종(play_expand 등)은 설계 문서 출처, 나머지 56종은 2026-07-08 멀티에이전트 저작.
# UNKNOWN은 domain 없음 (§5-8 미분류 pool). 수정 시 버전 규칙(minor/major)을 따를 것.
version: onto-1.0
change_type: major
domains:
- PLAY
- OBSERVATION
- DOCUMENT
- VISUAL
- COMMUNICATION
- OPERATION
- REFLECTION
intents:
- intent_id: play_expand
  domain: PLAY
  definition: 진행 중인 놀이의 장면이나 관찰 내용을 입력으로 받아, 그 놀이의 주제와 내용을 더 넓고 깊게 발전시킬 확장 아이디어를 제안한다.
  positive_examples:
  - 이 블록놀이 좀 더 키워볼 만한 거 없을까?
  - 얘들이 요즘 공룡에 푹 빠졌는데 여기서 뭘 더 해볼 수 있을까?
  negative_examples:
  - 이 놀이 슬슬 마무리하고 다음엔 뭘 해주면 좋을까?
  - 가게놀이 하는데 뭐 더 갖다주면 좋을까, 재료 같은 거?
  confusable_with:
  - play_transition_next_step
  - play_revive_stalled
  - doc_expand_text
- intent_id: play_transition_next_step
  domain: PLAY
  definition: 현재 진행 중인 놀이의 흐름과 도달 지점을 입력으로 받아, 그 놀이에서 이어서 전개할 다음 단계 활동을 제안한다.
  positive_examples:
  - 다음엔 뭘 해주면 좋을까?
  - 병원놀이 오늘 여기까지 했는데 내일은 뭘로 이어가지?
  negative_examples:
  - 이 놀이 더 크게 벌려볼 아이디어 없어?
  - 애들이 놀이에 흥미를 잃었는데 어떻게 다시 끌어올리지?
  confusable_with:
  - play_expand
  - play_flow_naturalize
  - write_activity_followup
- intent_id: play_flow_naturalize
  domain: PLAY
  definition: 계획된 놀이 활동들의 순서와 연결 상태를 입력으로 받아, 단계 사이의 전환이 매끄러워지도록 흐름을 다듬은 전개안을 제안한다.
  positive_examples:
  - 이 순서가 좀 뚝뚝 끊기는데 흐름 좀 매끄럽게 해줘
  - 도입에서 바로 만들기로 넘어가니까 어색해, 연결 좀 자연스럽게
  negative_examples:
  - 이 알림장 문장 좀 자연스럽게 다듬어줘
  - 이 놀이 다음 활동으로는 뭐가 좋을까?
  confusable_with:
  - text_naturalize
  - play_transition_next_step
  - doc_plan_draft
- intent_id: play_material_suggest
  domain: PLAY
  definition: 진행 중인 놀이의 주제와 상황을 입력으로 받아, 그 놀이에 새로 투입하면 좋을 놀잇감·재료 목록을 추천한다.
  positive_examples:
  - 가게놀이 하는데 뭐 더 넣어주면 좋을까?
  - 요즘 애들이 병원놀이에 푹 빠졌는데 새로 넣어줄 만한 재료 뭐 있을까?
  negative_examples:
  - 이 재료들 목록대로 주문 좀 넣어줘
  - 공룡놀이 더 재밌게 발전시킬 아이디어 없어?
  confusable_with:
  - op_material_prepare
  - play_environment_setup
- intent_id: play_scenario_generate
  domain: PLAY
  definition: 놀이 주제나 유아의 관심사를 입력으로 받아, 상상놀이에 바로 쓸 수 있는 이야기 배경과 역할 상황이 담긴 시나리오를 생성한다.
  positive_examples:
  - 우주 탐험 역할놀이 상황극 하나 짜줘
  - 얘들 소방관 놀이 하는데 출동하는 이야기 좀 만들어줘
  negative_examples:
  - 오늘 놀이한 거 이야기처럼 기록으로 써줘
  - 이 역할놀이 다음엔 어떤 활동으로 넘어갈까?
  confusable_with:
  - play_expand
  - visual_image_generate
- intent_id: play_inquiry_question
  domain: PLAY
  definition: 진행 중인 놀이 장면을 입력으로 받아, 유아의 탐구와 사고를 자극할 교사 발문 목록을 생성한다.
  positive_examples:
  - 그림자 놀이 하는데 애들한테 뭐라고 물어보면 좋을까?
  - 여기서 던질 만한 질문 몇 개만 뽑아줘
  negative_examples:
  - 학부모 만족도 설문 문항 좀 만들어줘
  - 이 탐색놀이 확장할 활동 아이디어 좀 줘
  confusable_with:
  - play_revive_stalled
  - play_expand
- intent_id: play_level_adapt
  domain: PLAY
  definition: 기존 놀이 활동을 입력으로 받아, 유아의 연령과 발달 수준에 맞게 난이도와 방법을 조정한 변형안을 생성한다.
  positive_examples:
  - 이거 만 3세도 할 수 있게 좀 쉽게 바꿔줘
  - 이 게임 우리 반 형님들한텐 너무 시시한데 좀 어렵게 해줄래?
  negative_examples:
  - 이 놀이 다음 단계로는 뭘 하면 좋을까?
  - 이 가정통신문 어휘 수준 좀 쉽게 낮춰줘
  confusable_with:
  - play_expand
  - play_revive_stalled
- intent_id: play_revive_stalled
  domain: PLAY
  definition: 흥미가 식거나 전개가 막힌 놀이 상황을 입력으로 받아, 유아의 몰입을 되살릴 교사 개입 방법을 제안한다.
  positive_examples:
  - 애들이 며칠 만에 시큰둥해졌는데 어떻게 다시 불붙이지?
  - 가게놀이가 손님이 없어서 영 안 굴러가, 뭘 해줘야 하나
  negative_examples:
  - 이 놀이 이제 마무리하고 다음엔 뭐 할까?
  - 이 놀이 더 크게 확장하고 싶은데 아이디어 줘
  confusable_with:
  - play_expand
  - play_material_suggest
  - play_transition_next_step
- intent_id: play_environment_setup
  domain: PLAY
  definition: 놀이 주제와 교실 여건을 입력으로 받아, 그 놀이가 잘 일어나도록 공간과 흥미 영역을 배치한 환경 구성안을 제안한다.
  positive_examples:
  - 역할놀이 영역 이번엔 어떻게 꾸며주지?
  - 블록이랑 미술 영역 자리 바꿔볼까 하는데 배치 좀 짜줘
  negative_examples:
  - 가게놀이에 쓸 소품은 뭐가 필요할까?
  - 이 활동 사진들 정리 좀 해줘
  confusable_with:
  - play_material_suggest
  - visual_layout_refine
- intent_id: obs_record_moment
  domain: OBSERVATION
  definition: 교사가 짧게 구술하거나 메모한 아이의 행동·말 장면을 입력받아 날짜·아동·상황 정보가 채워진 관찰 기록으로 저장한다.
  positive_examples:
  - 지호 방금 처음으로 가위질 성공했어, 이거 적어놔
  - 방금 그 상황 관찰일지에 남겨줘
  negative_examples:
  - 이거 알림장에 써줘
  - 지호 지난달 관찰 기록 좀 보여줘
  confusable_with:
  - doc_observation_record
  - obs_capture_scene
  - refl_self_journal
- intent_id: obs_capture_scene
  domain: OBSERVATION
  definition: 교사가 지목한 지금 벌어지고 있는 놀이·활동 장면을 사진이나 영상으로 포착해 관찰 증거로 저장한다.
  positive_examples:
  - 지금 이 장면 좀 찍어놔
  - 쌓기놀이 하는 거 영상으로 담아줘
  negative_examples:
  - 이 사진 정리 좀
  - 방금 서아가 한 말 기록해둬
  confusable_with:
  - obs_record_moment
  - obs_set_watchpoint
- intent_id: obs_tag_children
  domain: OBSERVATION
  definition: 화면에 열려 있는 사진이나 관찰 기록에 등장하는 아이가 누구인지 지정받아 그 자료를 해당 아동의 프로필에 연결한다.
  positive_examples:
  - 이 사진 서준이랑 하윤이야
  - 여기 나온 애들 태그 좀 해줘
  negative_examples:
  - 이 사진 하윤이 포트폴리오에 넣어줘
  - 이 사진 무슨 발달영역이야?
  confusable_with:
  - visual_photo_organize
  - op_workspace_organize
- intent_id: obs_classify_development
  domain: OBSERVATION
  definition: 화면의 관찰 기록이나 포착된 장면의 내용을 분석해 해당하는 발달 영역과 누리과정 지표로 분류한다.
  positive_examples:
  - 이 기록 어느 영역에 넣으면 돼?
  - 이거 의사소통 쪽으로 분류해줘
  negative_examples:
  - 이 기록 문장 좀 자연스럽게 다듬어줘
  - 민서 발달이 또래보다 느린 건 아니지?
  confusable_with:
  - refl_milestone_check
  - op_workspace_organize
- intent_id: obs_summarize_child
  domain: OBSERVATION
  definition: 지정된 아이의 누적 관찰 기록과 사진을 모아 최근 행동·발달 흐름을 한눈에 볼 수 있는 요약으로 생성한다.
  positive_examples:
  - 요즘 도윤이 어떻게 지내?
  - 이번 달 서아 관찰한 거 정리해줘
  negative_examples:
  - 도윤이 상담 때 쓸 자료로 만들어줘
  - 서아 요즘 좀 달라지지 않았어?
  confusable_with:
  - refl_child_progress_review
  - obs_detect_behavior_change
  - doc_portfolio_comment
- intent_id: obs_detect_behavior_change
  domain: OBSERVATION
  definition: 특정 아이 또는 반 전체의 관찰 데이터를 이전 시기와 비교해 달라진 행동 패턴이나 주의가 필요한 변화를 탐지해 보고한다.
  positive_examples:
  - 요즘 지우가 좀 달라진 것 같은데, 뭐 있어?
  - 혼자 노는 시간이 부쩍 는 애 있나 봐줘
  negative_examples:
  - 지우 이번 달 기록 요약해줘
  - 지우가 또 울면 바로 알려줘
  confusable_with:
  - refl_support_need_scan
  - obs_summarize_child
  - refl_child_progress_review
- intent_id: obs_recommend_focus
  domain: OBSERVATION
  definition: 아이별 관찰 기록의 누적량과 공백을 근거로 다음에 누구를 어떤 장면에서 관찰하면 좋을지 관찰 대상을 추천한다.
  positive_examples:
  - 내일은 누굴 좀 봐야 하지?
  - 관찰이 제일 부족한 애 누구야?
  negative_examples:
  - 다음엔 뭘 해주면 좋을까?
  - 요즘 눈에 띄게 변한 애 있어?
  confusable_with:
  - refl_support_need_scan
  - obs_set_watchpoint
- intent_id: obs_set_watchpoint
  domain: OBSERVATION
  definition: 지정된 아이의 특정 행동이나 상황이 다시 나타나면 포착하거나 교사에게 알리도록 관찰 워치포인트를 설정한다.
  positive_examples:
  - 준우가 또 친구 물면 바로 알려줘
  - 이번 주 서아 점심 얼마나 먹는지 좀 지켜봐줘
  negative_examples:
  - 내일 학부모 상담 까먹지 않게 알려줘
  - 준우 요즘 무는 게 늘었어?
  confusable_with:
  - obs_capture_scene
  - obs_recommend_focus
- intent_id: obs_search_records
  domain: OBSERVATION
  definition: 아이·기간·활동 같은 조건을 받아 과거의 관찰 기록과 포착된 장면을 검색해 화면에 불러와 보여준다.
  positive_examples:
  - 하윤이 블록놀이 했던 기록 찾아줘
  - 지난주 바깥놀이 때 찍은 거 어디 있지?
  negative_examples:
  - 하윤이 요즘 어때?
  - 이 사진들 날짜별로 정리해줘
  confusable_with:
  - op_workspace_search
  - obs_summarize_child
- intent_id: text_naturalize
  domain: DOCUMENT
  definition: 화면에서 선택했거나 방금 작성한 기존 글을 입력으로, 내용과 사실은 그대로 유지하면서 어색하거나 딱딱한 표현을 매끄러운 문장으로 고쳐 쓴 수정본을 만든다.
  positive_examples:
  - 이거 좀 자연스럽게 만들어줘
  - 문장이 너무 딱딱한데 좀 부드럽게 해줄래?
  negative_examples:
  - 이 사진 배치 좀 자연스럽게 해줘
  - 여기 맞춤법 틀린 데 있나 봐줘
  confusable_with:
  - visual_naturalize
  - doc_proofread
  - play_flow_naturalize
- intent_id: write_activity_followup
  domain: DOCUMENT
  definition: 방금 마친 활동의 사진·메모·관찰 내용을 입력으로, 활동이 어떻게 진행됐고 다음에 무엇으로 이어갈지를 담은 후속 기록 글을 새로 작성한다.
  positive_examples:
  - 오늘 물감놀이 한 거 후속 기록 좀 써줘
  - 아까 그 블록 활동 이어서 기록 남겨야 되는데 초안 좀
  negative_examples:
  - 다음엔 뭘 해주면 좋을까?
  - 오늘 찍은 활동 사진 정리 좀
  confusable_with:
  - refl_activity_review
  - play_transition_next_step
  - doc_plan_draft
- intent_id: doc_observation_record
  domain: DOCUMENT
  definition: 교사가 말하거나 메모해 둔 특정 아이의 행동·말 관찰 내용을 입력으로, 격식을 갖춘 관찰 기록 문서를 작성한다.
  positive_examples:
  - 지우가 오늘 블록으로 성 만들었거든, 이거 관찰기록으로 써줘
  - 얘가 오늘 처음으로 친구한테 먼저 말 걸었어, 기록 좀 남겨줘
  negative_examples:
  - 이 관찰기록 말투가 너무 평가처럼 들리는데 좀 다듬어줘
  - 지난달 관찰기록 어디 있지? 찾아줘
  confusable_with:
  - obs_record_moment
  - doc_portfolio_comment
- intent_id: doc_notice_draft
  domain: DOCUMENT
  definition: 준비물·일정·안내 사항 같은 전달 내용을 입력으로, 학부모에게 보낼 알림장 글 초안을 작성한다.
  positive_examples:
  - 내일 견학 가니까 준비물 알림장 좀 써줘
  - 다음 주 상담 주간 안내 나가야 돼, 알림장 초안 부탁해
  negative_examples:
  - 이 알림장 학부모들한테 지금 보내줘
  - 방금 쓴 알림장 초안 너무 긴데 핵심만 남게 줄여줘
  confusable_with:
  - comm_draft_parent_notice
  - comm_message_individual_parent
  - op_notice_send
- intent_id: doc_plan_draft
  domain: DOCUMENT
  definition: 활동 주제·기간·지난 계획 같은 정보를 입력으로, 주간·일일 계획안 문서의 초안을 작성한다.
  positive_examples:
  - 다음 주 주간계획안 좀 짜줘
  - 봄 프로젝트로 이번 주 일일계획 초안 만들어줄래?
  negative_examples:
  - 이 계획안 문장 좀 자연스럽게 다듬어줘
  - 이 다음 활동으로 뭐 하면 좋을까?
  confusable_with:
  - op_schedule_update
  - play_transition_next_step
- intent_id: doc_summarize
  domain: DOCUMENT
  definition: 선택한 긴 기록이나 문서를 입력으로, 핵심 내용만 남긴 더 짧은 요약문을 만든다.
  positive_examples:
  - 이거 너무 긴데 세 줄로 요약 좀
  - 이번 달 관찰기록들 핵심만 추려줘
  negative_examples:
  - 이 사진들 잘 나온 것만 추려줘
  - 이거 내용 좀 더 보태서 길게 써줘
  confusable_with:
  - obs_summarize_child
  - refl_period_retrospective
  - text_naturalize
- intent_id: doc_expand_text
  domain: DOCUMENT
  definition: 짧은 메모나 몇 문장짜리 초안을 입력으로, 내용을 구체화하고 살을 붙여 더 상세한 완성 글로 확장한다.
  positive_examples:
  - 이 메모 가지고 한 문단으로 늘려줘
