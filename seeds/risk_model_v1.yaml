# Risk Model v1 시드 — intent별 평가 위험 등급 (2026-07-10 사용자 승인)
#
# 이것은 intent의 **의미**가 아니라 **평가 정책**이다. 그래서 온톨로지(§5-9, 의미 구조의 유일한
# 권한)에 넣지 않는다. 온톨로지에 넣으면 위험 등급을 고칠 때마다 ontology_version이 올라가고,
# arena_runs.ontology_version(replay 축)이 흔들려 과거 run과 같은 축에서 비교할 수 없게 된다.
#
# 소비: config/experiments.yaml의 arena.critical_intents (CRITICAL 집합과 정확히 일치해야 하며
# scripts/validate_schemas.py가 불일치 시 loud-fail한다 — 빈 목록으로 게이트를 조용히 무력화하는
# 경로를 물리적으로 차단).
#
# 위험 판정 기준: "top-1 오예측이 실행됐을 때, 그 피해가 심각하고 **다른 어떤 게이트도 그것을
# 막지 못하는가**". 핵심 원칙은 **egress(유출) 경계에서 게이트하고, 그 하위 egress를 통해서만
# 비가역 피해가 실현되는 내부 변이는 이중 게이트하지 않는다** — 이중 게이트는 CWAR를 희석시킨다.

risk_model_version: rm-1.0

axes:
- id: E
  name: Irreversible external egress
  question: 오예측 실행이 아동 데이터·이미지·식별 콘텐츠를 교실 신뢰경계 밖(학부모/공개)으로 되돌릴 수 없이 내보내는가?
- id: D
  name: Irreversible data destruction
  question: 오예측 실행이 데이터를 파괴하며, 하위 어떤 경계에서도 복구되지 않는가?
- id: R
  name: Official/legal register mutation
  question: 오예측이 공식·법적 등록부(출석부 등)를 잘못 기록하고, 그 오기재 자체가 게이트 없이 외부 결과를 낳는가?

tiers:
- CRITICAL   # E·D·R 중 하나라도 HIGH — CWAR·게이트 대상
- ELEVATED   # 위험하지만 egress 경계에서 이미 게이트됨 — UX/telemetry 티어일 뿐 CWAR에 넣지 않는다
- STANDARD   # 되돌릴 수 있는 국소·생성적 제안

# evaluation_critical(intent) ⟺ tier == CRITICAL
intents:
- intent_id: comm_message_individual_parent
  tier: CRITICAL
  axis: E
  rationale: 특정 아동 관련 개별 메시지를 작성해 학부모에게 전송 — 오발화 시 아동 특정 정보가 교실 밖에 도달하고 회수가 곤란하다.
- intent_id: comm_share_media_with_parents
  tier: CRITICAL
  axis: E
  rationale: 아동 사진·영상을 학부모 채널로 push — 오발화 시 식별 가능한 미디어가 외부로 유출되며 되돌릴 수 없다.
- intent_id: comm_request_consent
  tier: CRITICAL
  axis: E
  rationale: 동의(현장학습·사진 사용) 요청을 학부모에게 발송 — 법적 동의 아티팩트가 교실 밖으로 나간다.
- intent_id: comm_schedule_send
  tier: CRITICAL
  axis: E
  rationale: 실제 예약 외부 발송을 등록 — 발화 시점에 사람이 개입하지 않은 채 학부모 발송이 큐잉되어, 취소창을 놓치기 쉬운 만큼 즉시 발송보다 위험하다.
- intent_id: op_notice_send
  tier: CRITICAL
  axis: E
  rationale: 작성된 알림을 학부모·전체에 즉시 발송 — 되돌릴 수 없는 외부 공개.
- intent_id: op_attendance_record
  tier: CRITICAL
  axis: R
  rationale: 공식 출석부에 최종 상태(병결·조퇴·결석)를 기재 — 보조금·안전 책임이 걸린 공식/법적 등록부의 오기재이며, 거짓 결석 알림이 가정으로 나갈 수도 있다.
- intent_id: op_workspace_delete
  tier: CRITICAL
  axis: D
  rationale: 워크스페이스 항목(아동 관찰기록·사진)을 삭제·휴지통 이동 — 오발화 시 데이터가 파괴되는 정경적 비가역 행위.

# --- ELEVATED: 위험하지만 CWAR·게이트에 넣지 않는다 (이중 게이트 = CWAR 희석) ---
- intent_id: obs_tag_children
  tier: ELEVATED
  axis: null
  rationale: 사진·기록을 아동 프로필에 결합하는 **내부** 동작. 오태깅은 교사에게 보이고 재태깅 가능하며, 비가역·유출 피해는 이미 CRITICAL인 share_media/document_export를 통해서만 실현된다. egress 경계에서 게이트한다. (리스크 패널 2/3은 CRITICAL을 주장했고 감사가 강등 — 2026-07-10 사용자 승인)
- intent_id: comm_share_with_colleague
  tier: ELEVATED
  axis: null
  rationale: 아동 기록이 교사 단독 통제 밖으로 나가긴 하나, 수신자는 기관 내부의 비밀유지 의무자다 — "가정·공개로 탈출" 기준 아래.
- intent_id: obs_record_moment
  tier: ELEVATED
  axis: null
  rationale: 아동 관찰 기록 작성 — 기록 무결성이 걸리지만 편집 가능한 내부 초안이며 유출되지 않는다.
- intent_id: obs_classify_development
  tier: ELEVATED
  axis: null
  rationale: 발달 영역 분류 — 평가 기록에 영향을 주나 확정 전 내부 상태다.
- intent_id: doc_observation_record
  tier: ELEVATED
  axis: null
  rationale: 공식 아동 기록의 무결성이 걸리지만 편집 가능한 미확정 내부 초안이며, 비가역도 유출도 아니다.
- intent_id: doc_portfolio_comment
  tier: ELEVATED
  axis: null
  rationale: 아동 포트폴리오 코멘트 — 학부모가 볼 수 있는 산출물의 재료이나 발송 자체는 별도 CRITICAL intent가 담당한다.

# 위에 없는 나머지 intent는 전부 STANDARD다 (되돌릴 수 있는 국소·생성적 제안).
# 특기: visual_privacy_mask는 STANDARD다. 위험 방향은 "마스킹을 원했는데 crop으로 오인식 →
# 아동 얼굴 미마스킹"이며, 이는 **발사(fire) 방향 CWAR로는 구조적으로 볼 수 없다.**
# 그래서 CWAR를 양방향(fire + miss)으로 정의했고, 이 실패는 CWAR-miss가 잡는다.
# (2026-07-10 사용자 결정 — docs/05-arena/README.md §4-4)
