# Kinder Intent Lab — 실험 파라미터 (단일 진실 원천)
# 규칙: 이 파일 밖(코드)에 임계값 리터럴 금지 (CLAUDE.md 절대 규칙 1).
# 전부 초기 제안값 — Arena zero-shot 베이스라인 측정 후 재설정한다.

foundry:
  dedup_similarity: 0.92          # S6 발화 중복 폐기 기준 (임베딩 코사인)
  paraphrase_max: 0.90            # S4 원문 잔존 판정 (TRANSFORM_ONLY 가드)
  scenario_variants: 4            # S5 frame당 workspace 변형 수
  extract_min: 0.60               # S3 extraction_confidence 사람 검토 기준
  consensus_min: 0.70             # Pilot 게이트
  judge_reject_max: 0.25          # 초과 시 스케일 중단
  pilot_kappa_min: 0.65           # Pilot 500 사람 스팟 검수
  consensus_disagreement_margin: 0.15  # S10 상위 후보 이견 판정 (CONSENSUS_DISAGREEMENT 원천)
  max_dedup_retries: 5            # S6 dedup 폐기 시 발화 재생성 상한 (n개 보장)
  batch_size: 50                  # 배치 러너 체크포인트 입도 (배치마다 commit)

brain:
  retrieval_top_k: 20
  exemplar_min_dist: 0.15         # exemplar 중복 방지 최소 임베딩 거리
  persona_prior_cap: 0.20         # prior가 점수를 바꿀 수 있는 최대 비율
  persona_warmup: 5               # 개인 prior 분기 전 최소 교정 수

decision:                          # Gym에서도 동일 정책 엔진 사용 (runtime 문서 §4)
  clarify_margin: 0.15
  clarify_confidence: 0.40
  abstain_score: 0.25
  execute_confidence: 0.75        # Stage 3 전용 (현 단계 미사용)
  execute_margin: 0.25
  clarify_per_utterance_max: 1
  clarify_per_session_max: 3

fast_update:
  fast_min_samples: 20            # experimental — 확정값 아님
  fast_delta_cap: 0.05            # experimental — 확정값 아님
  weekly_decay: 0.98

growth:
  confusion_trigger: 0.25         # C형 강화 발동 edge 기준 (confusion_rate)
  gold_low_threshold: 100         # B형 강화 발동 기준 (노드 GOLD 절대량 미달)
  default_pack_items: 20
  coverage_order_items: 12        # A형 Foundry 작업주문이 요청하는 시나리오 수
  priority_weights:               # §6-3 훈련 우선순위 (순위 신호 가중치, 상대 비교용)
    heldout_low: 0.30             # ① heldout 정확도 최저
    confusion_high: 0.25          # ② confusion_rate 최고 edge
    performance_drop: 0.15        # ③ 최근 성능 하락
    evidence_low: 0.15            # ④ evidence 최소
    persona_impact: 0.10          # ⑤ persona 영향 큰
    service_importance: 0.05      # ⑥ 서비스 중요도

gym:                               # Gym 세션 → evidence 적재 (§8-1)
  evidence_strength: 0.9          # 교사 트레이너 라벨의 기본 신호 강도 (aggregator 가중 입력)
  session_items: 6                # 세션당 기본 아이템 수 (default_pack_items의 플레이 서브셋)

diagnosis:                         # T4.1 Weakness 진단 4축 레벨 버킷 임계 (§7-3, 원값→HIGH/MED/LOW)
  ambiguous_competitors_low: 1.0  # Atlas 평균 경쟁 intent 수 (높을수록 모호)
  ambiguous_competitors_high: 2.5
  screen_coverage_low: 0.3        # S5 변형축 커버리지 [0,1] (낮을수록 약함)
  screen_coverage_high: 0.6
  persona_entropy_low: 0.3        # persona 정규화 엔트로피 [0,1] (낮을수록 약함)
  persona_entropy_high: 0.6
  gold_low: 3                     # GOLD 에피소드 절대량 (낮을수록 약함)
  gold_high: 10

ontology:
  min_intents: 60                 # v1 시드 최소 intent 수 (UNKNOWN 제외)
  min_examples_per_side: 2        # intent당 positive/negative 예시 최소 수

llm:                               # LLM 호출 정책 (벤더 무관 — provider는 env로 주입)
  max_retries: 2                  # 일시 오류·타임아웃 시 추가 재시도 횟수
  timeout_s: 30.0                 # 호출 1회 타임아웃(초)
  retry_backoff_s: 0.5            # 재시도 간 백오프 기준(초, attempt에 비례)

atlas:
  map_min_similarity: 0.85        # 발화→pattern_cluster 매핑 최소 임베딩 유사도 (§2-4 coverage)

persona:                           # §4-1 [4] 밀도 기반 클러스터링 (HDBSCAN 파라미터)
  cluster_min_size: 3             # 최소 클러스터 크기
  cluster_min_samples: 2          # core point 판정 이웃 수
  min_interactions: 10            # 트레이너 1인이 성향을 주장하려면 필요한 최소 상호작용 수

label_aggregator:
  min_label_functions: 2          # 독립 labeling 신호 최소 수
  aggregate_confidence_min: 0.60
  conflict_max: 0.30
  evidence_type_weights: empirical  # 고정 서열 금지 — 실측 신뢰도로 갱신

review:                            # §3-3 GOLD = "인간 검수 2인 이상 일치(kappa 기록)"
  min_reviewers: 2                 # 한 에피소드를 확정하는 데 필요한 서로 다른 검수자 수
  min_agreement_kappa: 0.65        # 배치 전체의 검수자 간 일치도 하한 (미달 시 배치 전량 거부)

version_gate:
  min_new_gold: 200
  promote_rule: global_up_and_no_region_regression_and_no_critical_worse

visual_semantics:
  vocabulary_version: vs-1.0
  ktib_extractor_pinned: true     # KTIB 재추출 금지 (문서 §8-2)

stages:                            # §7-6 성장 스테이지 판정 기준 (전부 Arena 산출)
  cluster_awake_measured_ratio: 0.50  # Stage 2: region 내 노드 중 heldout 측정 완료 비율
  region_online_reliability: 0.70     # Stage 3: region reliability. Stage 4의 '인접 region ≥ 70%'도 이 값
  # Stage 5(global) 기준은 arena.first_intent_accuracy_target을 재사용한다 — 목표가 둘이면 안 된다.
  # Stage 4 = Semantic Cross-Region Flow (§7-6, 2026-07-10 확정). 인접 = state=confirmed인
  # cross-region confusion edge. '주요 confusion edge 감소 추세'는 아래 3키로 판정한다.
  cross_region_trend_window: 3        # 동일 ktib_version 최근 brain run 수 (추세 윈도 W)
  cross_region_trend_min_drop: 0.02   # 주요 다리 평균 confusion_rate의 순감소 하한
  cross_region_major_edge_min: 0.15   # 윈도 '시작 run'에서 주요 다리로 스냅샷할 rate 하한

gate:                              # §10-2 live rollout 준비 게이트 (읽기 전용 리포트, PARTIAL HOLD)
  # 전부 초기 제안값 — §8-2 규율대로 zero-shot 베이스라인 측정 후 재확정 대상이다.
  cwar_max: 0.02                      # CWAR-fire 상한: 커밋한 critical 행동 중 오발 비율
  cwar_min_items: 30                  # CWAR-fire 분모(커밋한 critical) 표본 하한
  cwar_miss_max: 0.05                 # CWAR-miss 상한: 정답이 critical인데 놓친 비율
  critical_surface_min_items: 30      # 정답이 critical인 아이템 수 하한 (CWAR-miss·CCC 공용 분모)
  critical_commit_coverage_min: 0.80  # CCC 하한 — critical을 clarify/abstain으로 세탁하지 못하게
  recovery_min: 0.70                  # 1-Turn Recovery 하한
  recovery_min_clarify: 20            # Recovery 분모(clarify 건수) 표본 하한
  persona_harm_margin: 0.0            # Harm−Lift > margin → 비활성화 '제안' (§4-2)
  persona_eval_min_items: 30          # per-cluster Lift/Harm 표본 하한
  sustained_runs: 2                   # §10-2 '2주 유지' = 연속 brain run 수 (arena.schedule=weekly)

arena:
  schedule: weekly
  ood_score_threshold: 0.25       # OOD 판정 (전 후보 score 미만)
  ece_bins: 10                    # calibration ECE 등간격 신뢰도 버킷 수 (§8-2 calibration)
  confusion_confirm_min: 3        # arena 오답이 이 횟수 이상인 pair만 edge state=confirmed (§5-6)
  first_intent_accuracy_target: 0.80  # §10-2 KTIB 1차 목표 — zero-shot 베이스라인 후 재확정 대상
  # §6-6 promote의 'critical 악화 없음' 대상 + CWAR 집합. seeds/risk_model_v1.yaml(rm-1.0)에서
  # 파생되며 validate_schemas.py가 정합을 강제한다 — 여기를 비우면 게이트가 조용히 무력화된다.
  critical_intents:
    - comm_message_individual_parent   # E: 개별 학부모 전송
    - comm_request_consent             # E: 동의 아티팩트 발송
    - comm_schedule_send               # E: 예약 외부 발송(발화 시점 사람 미개입)
    - comm_share_media_with_parents    # E: 아동 미디어 외부 유출
    - op_attendance_record             # R: 공식·법적 등록부 오기재
    - op_notice_send                   # E: 즉시 외부 공개
    - op_workspace_delete              # D: 비가역 데이터 파괴

latency:                           # 0b shadow는 비동기라 미적용. live 목표값(참고용, PARTIAL HOLD)
  live_p50_ms: 600
  live_p95_ms: 1200
  client_deadline_ms: 1500
  useful_response_rate_min: 0.95

campaign:                          # T2.5 10k~30k 생성 캠페인 (§10-2 Phase 2, §1-14 기준선)
  window_batches: 4               # 품질 윈도(=주간 리포트) 단위 — 배치 N개마다 게이트 평가
  consensus_drop_max: 0.15        # 윈도 합의도가 Pilot 기준선보다 이 값 넘게 떨어지면 악화
  reject_rise_max: 0.15           # 윈도 reject율이 기준선보다 이 값 넘게 오르면 악화
  unit_cost_rise_ratio: 0.25      # 단가(시도당 토큰)가 기준선 대비 이 비율 넘게 오르면 악화
  domain_weights:                 # 도메인 배분 — DOCUMENT+VISUAL 우선 (합=1.0)
    DOCUMENT: 0.25
    VISUAL: 0.25
    PLAY: 0.12
    OBSERVATION: 0.12
    COMMUNICATION: 0.10
    OPERATION: 0.08
    REFLECTION: 0.08
